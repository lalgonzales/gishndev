name: docs-build
on:
    pull_request:
        branches:
            - main
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install GDAL
              run: |
                  python -m pip install --upgrade pip
            #       pip install --find-links=https://girder.github.io/large_image_wheels --no-cache GDAL pyproj
            # - name: Test GDAL installation
            #   run: |
            #       python -c "from osgeo import gdal"
            #       gdalinfo --version

            # - name: Install dependencies
            #   run: |
            #       pip install --no-cache-dir Cython
            #       pip install -r requirements.txt -r requirements_dev.txt
            #       pip install .

            - name: Set up Earth Engine credentials
              env:
                  GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.EARTHENGINE_TOKEN }}
              run: |
                  echo "$GEE_SERVICE_ACCOUNT_KEY" > gee_service_account.json
                  export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gee_service_account.json

            - name: Run Earth Engine credentials setup script
              run: python ../ee_token.py

